<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu entrega está lista 🎬</title>

  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:type"         content="website" />
  <meta property="og:title"        content="Tu entrega está lista 🎬" />
  <meta property="og:description"  content="Synergy Productora · Abraham Oca — Productor Audiovisual Inmobiliario" />
  <meta property="og:image"        content="https://synergyproductora-cpu.github.io/synergy-entrega/og-preview.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:image"       content="https://synergyproductora-cpu.github.io/synergy-entrega/og-preview.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1923;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6aa3d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
    }
    .error {
      font-size: 13px;
      color: #E24B4A;
      text-align: center;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="logo">Abraham Oca · Synergy Productora</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Cargando tu entrega...</div>

  <script>
    // ID del Google Sheet — cámbialo por el tuyo
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7alXj6Y_AIAV1sJb5PTlyt4an5j_Mq47gTgj0YqmIYcGmEk2fUbThf4az9xdz8IykugGN72GNKYsP/pub?gid=1748678092&single=true&output=csv";

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("c");

    if (!codigo) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("msg").style.display = "none";
      document.body.insertAdjacentHTML("beforeend",
        '<div class="error">Enlace inválido. Solicita un nuevo enlace a Synergy Productora.</div>');
    } else {
      const csvUrl = CSV_URL;

      fetch(csvUrl)
        .then(r => r.text())
        .then(csv => {
          const filas = csv.trim().split("\n").slice(1); // Omite encabezado
          for (const fila of filas) {
            const cols = fila.split(",");
            const cod  = cols[0].replace(/"/g, "").trim();
            const url  = cols[1].replace(/"/g, "").trim();
            if (cod === codigo && url) {
              window.location.replace(url);
              return;
            }
          }
          // No se encontró el código
          document.getElementById("spinner").style.display = "none";
          document.getElementById("msg").style.display = "none";
          document.body.insertAdjacentHTML("beforeend",
            '<div class="error">Este enlace no existe o expiró.<br>Solicita un nuevo enlace a Synergy Productora.</div>');
        })
        .catch(() => {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("msg").style.display = "none";
          document.body.insertAdjacentHTML("beforeend",
            '<div class="error">Error al cargar. Verifica tu conexión e intenta de nuevo.</div>');
        });
    }
  </script>
</body>
</html>
